<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SMASH — Minimal HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root{
      --teal:#00c0c0;
      --navy:#000030;
      --red:#e01020;
      --cream:#f2f0e8;
      --muted: rgba(0,0,48,.62);

      --shadow: 10px 14px 0 rgba(0,0,48,.22);
      --shadow2: 6px 8px 0 rgba(0,0,48,.18);
      --r-xl: 22px;
      --r: 16px;

      --safe-top: env(safe-area-inset-top);
      --safe-bot: env(safe-area-inset-bottom);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--teal);
      color: var(--navy);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-20vh -25vw;
      background:
        linear-gradient(135deg, rgba(224,16,32,.0) 55%, rgba(224,16,32,.30) 55% 62%, rgba(224,16,32,0) 62%),
        linear-gradient(0deg, rgba(0,0,48,.10), rgba(0,0,48,.10));
      transform: rotate(-6deg);
      pointer-events:none;
      z-index:0;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 2px, transparent 2px 38px);
      opacity:.22;
      pointer-events:none;
      z-index:0;
      mix-blend-mode: soft-light;
    }

    .app{
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      flex-direction:column;
      padding: calc(14px + var(--safe-top)) 14px calc(14px + var(--safe-bot)) 14px;
      gap: 12px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px;
      border:2px solid var(--navy);
      border-radius: var(--r-xl);
      background: var(--cream);
      box-shadow: var(--shadow2);
    }
    .brand{ min-width:0; }
    .brand .name{
      font-family:"Bebas Neue";
      font-size:18px;
      letter-spacing:.18em;
      text-transform:uppercase;
      line-height:1;
    }
    .brand .tag{
      font-size:12px;
      color: var(--muted);
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .nav{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    button{ appearance:none; border:0; background:none; color:inherit; font:inherit; }
    .btn{
      height:42px;
      padding:0 12px;
      border-radius:999px;
      border:2px solid var(--navy);
      background:#fff;
      box-shadow:4px 6px 0 rgba(0,0,48,.18);
      font-weight:1000;
      font-size:12px;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
      transition: transform .10s ease, box-shadow .10s ease;
      white-space:nowrap;
    }
    .btn:active{ transform: translate(2px,2px); box-shadow:2px 3px 0 rgba(0,0,48,.18); }
    .btn.primary{ background: var(--red); color:#fff; }
    .btn.ghost{ background: var(--cream); }
    .btn.pill18.on{ background: var(--navy); color:#fff; }

    .panel{
      flex:1;
      min-height:0;
      border:2px solid var(--navy);
      border-radius: var(--r-xl);
      background: var(--cream);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .panel-header{
      padding:14px;
      border-bottom:2px solid var(--navy);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .title h1{
      margin:0;
      font-family:"Bebas Neue";
      font-size:22px;
      letter-spacing:.10em;
      text-transform:uppercase;
      line-height:1;
    }
    .title p{ margin:0; font-size:12px; color:var(--muted); font-weight:800; line-height:1.35; }

    .meta{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      font-size:11px;
      border:2px solid var(--navy);
      border-radius:999px;
      padding:6px 10px;
      background:#fff;
      font-weight:900;
      color: var(--muted);
      white-space:nowrap;
    }

    .content{
      flex:1;
      min-height:0;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .card{
      border:2px solid var(--navy);
      border-radius: var(--r);
      background:#fff;
      box-shadow: var(--shadow2);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .card.click{ cursor:pointer; }
    .card h2{
      margin:0;
      font-family:"Bebas Neue";
      font-size:18px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .card p{ margin:0; font-size:12px; color:var(--muted); font-weight:800; line-height:1.4; }
    .divider{ height:2px; background: rgba(0,0,48,.14); }

    .stage{
      position:relative;
      width:100%;
      height: min(72vh, 680px);
      border:2px solid var(--navy);
      border-radius: var(--r-xl);
      background:#fff;
      box-shadow: var(--shadow2);
      overflow:hidden;
    }

    /* PLAY MODE: hide extra HUD, keep only the stage */
    body.playing .topbar{ display:none; }
    body.playing .panel-header{ display:none; }
    body.playing .content{ padding: 0; }
    body.playing .panel{ background: transparent; border-color: transparent; box-shadow:none; }
    body.playing .stage{ height: calc(100vh - (28px + var(--safe-top) + var(--safe-bot))); border-radius: 24px; }

    .arena{
      position:absolute;
      inset:0;
      background:#fff;
    }

    /* Single “command” overlay (one display). No countdown bar. */
    .cmd{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      pointer-events:none;
      z-index: 20;
    }
    .cmd .box{
      max-width: 92%;
      border:2px solid var(--navy);
      border-radius: 18px;
      background: rgba(242,240,232,.92);
      box-shadow: var(--shadow2);
      padding: 12px 14px;
      text-align:center;
      transform: rotate(-6deg);
      opacity: 0;
      animation: cmdIn .55s ease-out forwards;
    }
    .cmd .big{
      font-family:"Bebas Neue";
      font-size: 58px;
      letter-spacing: .18em;
      text-transform: uppercase;
      line-height: 1;
    }
    .cmd .small{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.35;
      text-transform: none;
      letter-spacing: .02em;
    }
    @keyframes cmdIn {
      0%{ opacity:0; transform: rotate(-6deg) scale(.92); }
      18%{ opacity:1; }
      100%{ opacity:1; transform: rotate(-6deg) scale(1); }
    }
    .cmd.out .box{
      animation: cmdOut .28s ease-in forwards;
    }
    @keyframes cmdOut {
      from{ opacity:1; transform: rotate(-6deg) scale(1); }
      to{ opacity:0; transform: rotate(-6deg) scale(.96); }
    }

    /* OK/MISS stamp (single display) */
    .stamp{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      pointer-events:none;
      z-index: 30;
    }
    .stamp .t{
      font-family:"Bebas Neue";
      font-size: 88px;
      letter-spacing: .20em;
      text-transform: uppercase;
      padding: 10px 14px;
      border:2px solid var(--navy);
      border-radius: 18px;
      box-shadow: var(--shadow2);
      transform: rotate(-10deg);
      opacity:0;
      animation: stamp .35s ease-out forwards;
    }
    .stamp .t.ok{ background: rgba(0,192,192,.90); }
    .stamp .t.miss{ background: rgba(224,16,32,.90); color:#fff; }
    @keyframes stamp {
      0%{ opacity:0; transform: rotate(-10deg) scale(.88); }
      20%{ opacity:1; }
      100%{ opacity:1; transform: rotate(-10deg) scale(1); }
    }

    /* Floating exit button in play mode */
    .floatExit{
      position: fixed;
      top: calc(10px + var(--safe-top));
      left: 10px;
      z-index: 999;
      display:none;
    }
    body.playing .floatExit{ display:block; }
    .floatExit .btn{ height: 44px; padding: 0 14px; }

    /* 18+ modal */
    .modal{
      position: fixed;
      inset: 0;
      display:none;
      z-index: 1000;
      background: rgba(0,0,48,.45);
      backdrop-filter: blur(10px);
      padding: 16px;
    }
    .modal.show{ display:flex; align-items:flex-end; justify-content:center; }
  </style>
</head>
<body>
  <div class="floatExit">
    <button class="btn" id="btn-exit">✕</button>
  </div>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="name">SMASH</div>
        <div class="tag" id="tagline">Minimal HUD • keine Countdown‑Anzeige • ein Kommando</div>
      </div>
      <div class="nav">
        <button class="btn ghost" id="btn-home">Home</button>
        <button class="btn" id="btn-practice">Üben</button>
        <button class="btn primary" id="btn-run">Run</button>
        <button class="btn pill18" id="btn-18">18+</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="title">
          <h1 id="h1">Home</h1>
          <p id="hsub">Run = Zeitdruck (unsichtbar). Anzeige = nur 1 Kommando.</p>
        </div>
        <div class="meta">
          <div class="pill" id="pill-mode">Modus: Home</div>
          <div class="pill" id="pill-streak">Streak: 0</div>
          <div class="pill" id="pill-miss">Miss: 0</div>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <div class="modal" id="modal18" role="dialog" aria-modal="true">
    <div class="card" style="max-width:600px;width:100%;">
      <h2>18+ MODE</h2>
      <p>Frecher, erotischer Unterton, rabenschwarz. Keine expliziten Details. (Nur Text‑Flavor.)</p>
      <div class="divider"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" id="m18-no" style="height:56px;flex:1 1 160px;">Nope</button>
        <button class="btn primary" id="m18-yes" style="height:56px;flex:1 1 160px;">Ja, 18+</button>
      </div>
    </div>
  </div>

  function decodePack(){
    const bin = atob(PACK_B64);
    const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(new TextDecoder("utf-8").decode(bytes));
  }

  const PACK_GAMES = decodePack();

  const $ = (s, r=document) => r.querySelector(s);

  const state = {
    mode: "home", // home | practice | run
    streak: 0,
    miss: 0,
    best: 0,
    baseLimitMs: 6500,
    limitMs: 6500,
    current: null,
    locked: false,
    timer: null,
    tick: null,
    autoNext: null,
    roundToken: "",
    adult: false,
  };

  function vibrate(ms=12){ try{ if (navigator.vibrate) navigator.vibrate(ms); }catch(_){} }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function randToken(){ return Math.random().toString(16).slice(2) + Math.random().toString(16).slice(2); }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }

  function save(){
    try{
      localStorage.setItem("smash_minimalhud", JSON.stringify({ adult: state.adult, best: state.best }));
    } catch(_){}
  }
  function load(){
    try{
      const v = JSON.parse(localStorage.getItem("smash_minimalhud") || "{}");
      if (typeof v.adult === "boolean") state.adult = v.adult;
      if (typeof v.best === "number") state.best = v.best;
    } catch(_){}
  }

  function setHeader(title, sub){
    $("#h1").textContent = title;
    $("#hsub").textContent = sub;
    $("#pill-mode").textContent = "Modus: " + (state.mode === "run" ? "Run" : state.mode === "practice" ? "Üben" : "Home");
    $("#pill-streak").textContent = "Streak: " + state.streak + " (Best: " + state.best + ")";
    $("#pill-miss").textContent = "Miss: " + state.miss;
  }

  function clearContent(){
    const c = $("#content");
    c.innerHTML = "";
    c.scrollTop = 0;
  }

  function stopTimers(){
    if (state.timer) { clearTimeout(state.timer); state.timer = null; }
    if (state.tick) { clearInterval(state.tick); state.tick = null; }
    if (state.autoNext) { clearTimeout(state.autoNext); state.autoNext = null; }
  }

  // Convert long prompt -> command word + subtext.
  function commandFromPrompt(prompt){
    const p = (prompt || "GO").trim();
    const low = p.toLowerCase();

    let cmd = "GO!";
    if (/(wisch|swipe)/.test(low)) cmd = "SWIPE!";
    else if (/(zieh|ziehen|drag|schieb)/.test(low)) cmd = "PULL!";
    else if (/(halte|hold)/.test(low)) cmd = "HOLD!";
    else if (/(klick|click|tippe|tap)/.test(low)) cmd = "TAP!";
    else if (/(drück|drueck|mash|spam)/.test(low)) cmd = "MASH!";

    // keep full prompt as small subtext, but single overlay
    return { cmd, sub: p };
  }

  function enterPlayMode(){
    document.body.classList.add("playing");
  }
  function exitPlayMode(){
    document.body.classList.remove("playing");
  }

  function showCommand(stage, prompt){
    const info = commandFromPrompt(prompt);
    const cmd = document.createElement("div");
    cmd.className = "cmd";
    cmd.innerHTML = `
      <div class="box">
        <div class="big">${escapeHtml(info.cmd)}</div>
        <div class="small">${escapeHtml(info.sub)}</div>
      </div>
    `;
    stage.appendChild(cmd);

    setTimeout(() => {
      cmd.classList.add("out");
      setTimeout(() => cmd.remove(), 320);
    }, 700);
  }

  function showStamp(stage, ok){
    const s = document.createElement("div");
    s.className = "stamp";
    s.innerHTML = `<div class="t ${ok ? "ok" : "miss"}">${ok ? "OK" : "MISS"}</div>`;
    stage.appendChild(s);
    setTimeout(() => s.remove(), 420);
  }

  function renderHome(){
    stopTimers();
    exitPlayMode();
    state.mode = "home";
    clearContent();
    setHeader("Home", "Ein Kommando. Kein Countdown. Dann schreiben.");

    const c = $("#content");

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h2>Start</h2>
      <p>Run = Zeitdruck (unsichtbar). Üben = ohne Zeit. Anzeige = nur ein Kommando‑Popup.</p>
      <div class="divider"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn primary" id="goRun" style="height:56px;flex:1 1 160px;">Run</button>
        <button class="btn" id="goPractice" style="height:56px;flex:1 1 160px;">Üben</button>
      </div>
      <div style="font-size:11px;color:var(--muted);font-weight:900;line-height:1.35;">
        Pool: Pack <strong>${PACK_GAMES.length}</strong> + Core <strong>3</strong> ${
          state.adult ? "+ 18+ Flavor" : ""
        }
      </div>
    `;
    c.appendChild(card);

    $("#goRun").addEventListener("click", startRun);
    $("#goPractice").addEventListener("click", renderPractice);
  }

  function renderPractice(){
    stopTimers();
    exitPlayMode();
    state.mode = "practice";
    clearContent();
    setHeader("Üben", "Keine Zeit. Nur fühlen.");

    const c = $("#content");

    const core = document.createElement("div");
    core.className = "card";
    core.innerHTML = `<h2>Core</h2><p>MASH / SWIPE / PULL</p>`;
    c.appendChild(core);

    const items = ALL_GAMES().slice(0, 12); // keep short list
    for (const g of items){
      const card = document.createElement("div");
      card.className = "card click";
      card.innerHTML = `<h2>${escapeHtml(g.title)}</h2><p>${escapeHtml(g.prompt || "")}</p>`;
      card.addEventListener("click", () => startRound({ forced: g }));
      c.appendChild(card);
    }
  }

  function ALL_GAMES(){
    const core = [
      {
        id:"mash_the_button",
        title:"Mash the Button",
        prompt:"Drück schnell genug.",
        type:"core",
        render:(api)=> renderMash(api, { label:"MASH", taps: 14 })
      },
      {
        id:"swipe_the_scratch",
        title:"Swipe the Scratch",
        prompt:"Wisch die Linie entlang.",
        type:"core",
        render:(api)=> renderSwipeCheckpoints(api)
      },
      {
        id:"pull_the_handle",
        title:"Pull the Handle",
        prompt:"Zieh bis ganz rechts.",
        type:"core",
        render:(api)=> renderPull(api)
      },
    ];

    const pack = PACK_GAMES.map(g => ({ ...g, type:"iframe", render:(api)=> renderPack(api, g) }));

    return core.concat(pack);
  }

  function startRun(){
    stopTimers();
    state.mode = "run";
    state.streak = 0;
    state.miss = 0;
    state.limitMs = state.baseLimitMs;
    setHeader("Run", "Zeitdruck unsichtbar. Du spürst ihn.");
    startRound({ forced: null });
  }

  function startRound({ forced }){
    stopTimers();
    enterPlayMode();
    state.locked = false;
    state.roundToken = randToken();

    const pool = ALL_GAMES();
    const game = forced || pick(pool);
    state.current = game;

    clearContent();

    const stageWrap = document.createElement("div");
    stageWrap.className = "stage";
    stageWrap.innerHTML = `<div class="arena" id="arena"></div>`;
    $("#content").appendChild(stageWrap);

    const arena = $("#arena", stageWrap);

    const api = {
      arena,
      mode: state.mode,
      token: state.roundToken,
      ok: (extra) => resolveRound(true, extra),
      miss: (extra) => resolveRound(false, extra),
      vibrate,
    };

    // Single command overlay (no bar, no extra HUD)
    showCommand(stageWrap, game.prompt || "GO!");

    game.render(api);

    if (state.mode === "run"){
      state.timer = setTimeout(() => {
        resolveRound(false, "timeout");
      }, state.limitMs);
    }
  }

  function resolveRound(ok, extra){
    if (state.locked) return;
    state.locked = true;
    stopTimers();

    const stage = document.querySelector(".stage");
    if (stage) showStamp(stage, ok);

    if (ok){
      state.streak += 1;
      state.best = Math.max(state.best, state.streak);
      state.limitMs = clamp(state.baseLimitMs - state.streak * 260, 3000, state.baseLimitMs);
      vibrate(16);
    } else {
      state.miss += 1;
      state.streak = 0;
      state.limitMs = state.baseLimitMs;
      vibrate(24);
    }
    save();

    if (state.mode === "run"){
      state.autoNext = setTimeout(() => {
        if (state.miss >= 3) renderRunEnd();
        else startRound({ forced: null });
      }, 520);
    } else {
      // practice: restart same game quickly
      state.autoNext = setTimeout(() => startRound({ forced: state.current }), 520);
    }
  }

  function renderRunEnd(){
    stopTimers();
    exitPlayMode();
    clearContent();
    setHeader("Run fertig", "Jetzt schreiben. 2 Sätze.");

    const c = $("#content");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h2>Re‑Entry</h2>
      <p><strong>2 räudige Sätze.</strong> Kein Polieren. Dann darfst du wieder fancy.</p>
      <div class="divider"></div>
      <div class="card" style="box-shadow:none;border-style:dashed;background: rgba(0,192,192,.10);">
        1) Satz: „Jedenfalls…“<br/>
        2) Satz: „Und dann…“
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn primary" id="again" style="height:56px;flex:1 1 160px;">Nochmal</button>
        <button class="btn" id="home2" style="height:56px;flex:1 1 160px;">Home</button>
      </div>
    `;
    c.appendChild(card);

    $("#again").addEventListener("click", startRun);
    $("#home2").addEventListener("click", renderHome);
  }

  /* Pack iframe */
  function renderPack(api, game){
    const iframe = document.createElement("iframe");
    iframe.style.position = "absolute";
    iframe.style.inset = "0";
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "0";
    iframe.setAttribute("sandbox", "allow-scripts allow-same-origin");
    iframe.setAttribute("title", game.title || "Pack");
    iframe.srcdoc = String(game.srcdoc || "").replaceAll("__SMASH_TOKEN__", api.token);
    api.arena.appendChild(iframe);

    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type !== "smash_done") return;
      if (d.token !== api.token) return;
      window.removeEventListener("message", onMsg);
      const text = String(d.text || "");
      const bad = /(falsch|zu\s*spät|daneben|nein|miss|fail|zu\s*langsam|verloren)/i.test(text);
      if (bad) api.miss(text);
      else api.ok(text);
    };
    window.addEventListener("message", onMsg);
  }

  /* Core gesture games */
  function svgEl(tag, attrs={}){
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, String(v));
    return el;
  }

  function renderMash(api, opts){
    const tapsNeeded = opts?.taps ?? 14;
    let taps = 0;
    let done = false;

    const svg = svgEl("svg", { viewBox:"0 0 900 540", width:"100%", height:"100%", preserveAspectRatio:"xMidYMid slice" });
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:540, fill:"#f2f0e8" }));
    svg.appendChild(svgEl("polygon", { points:"0,0 900,0 900,380 0,260", fill:"#00c0c0" }));
    svg.appendChild(svgEl("polygon", { points:"0,330 900,210 900,260 0,380", fill:"#e01020" }));

    const btn = svgEl("circle", { cx:450, cy:320, r:120, fill:"#fff", stroke:"#000030", "stroke-width":12 });
    const txt = svgEl("text", { x:450, y:336, "text-anchor":"middle", "font-family":"Bebas Neue, Inter, system-ui", "font-size":64, "letter-spacing":"0.18em", fill:"#000030" });
    txt.textContent = opts?.label || "MASH";

    const gaugeBg = svgEl("rect", { x:200, y:430, width:500, height:26, rx:13, fill:"#fff", stroke:"#000030", "stroke-width":10 });
    const gauge = svgEl("rect", { x:206, y:436, width:0, height:14, rx:7, fill:"#e01020" });

    svg.appendChild(gaugeBg);
    svg.appendChild(gauge);
    svg.appendChild(btn);
    svg.appendChild(txt);

    api.arena.appendChild(svg);

    api.arena.addEventListener("pointerdown", () => {
      if (done) return;
      taps += 1;
      api.vibrate(8);
      gauge.setAttribute("width", String(Math.min(488, Math.round(488*(taps/tapsNeeded)))));
      svg.animate([{transform:"scale(1)"},{transform:"scale(1.01)"},{transform:"scale(1)"}],{duration:110});
      if (taps >= tapsNeeded){ done = true; api.ok("mash"); }
    }, { passive:true });
  }

  function renderPull(api){
    let done = false;
    const svg = svgEl("svg", { viewBox:"0 0 900 540", width:"100%", height:"100%", preserveAspectRatio:"xMidYMid slice" });
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:540, fill:"#f2f0e8" }));
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:200, fill:"#00c0c0" }));
    svg.appendChild(svgEl("polygon", { points:"0,200 900,200 900,260 0,340", fill:"#e01020" }));

    const track = svgEl("rect", { x:140, y:360, width:620, height:34, rx:17, fill:"#fff", stroke:"#000030", "stroke-width":10 });
    const handle = svgEl("circle", { cx:160, cy:377, r:34, fill:"#e01020", stroke:"#000030", "stroke-width":10 });
    svg.appendChild(track);
    svg.appendChild(handle);
    api.arena.appendChild(svg);

    let isDown=false, sx=0, start=160;
    api.arena.addEventListener("pointerdown",(e)=>{
      if (done) return;
      isDown=true; sx=e.clientX; start=parseFloat(handle.getAttribute("cx")||"160");
      api.arena.setPointerCapture(e.pointerId); api.vibrate(8);
    });
    api.arena.addEventListener("pointermove",(e)=>{
      if(!isDown||done) return;
      const r=api.arena.getBoundingClientRect();
      const dx=(e.clientX-sx)/r.width*900;
      const cx=Math.max(160, Math.min(740, start+dx));
      handle.setAttribute("cx", String(cx));
      if (cx>=700 && !done){ done=true; api.ok("pull"); }
    });
    api.arena.addEventListener("pointerup",()=>{isDown=false;});
    api.arena.addEventListener("pointercancel",()=>{isDown=false;});
  }

  function renderSwipeCheckpoints(api){
    let done=false;
    const pts=[{x:150,y:360},{x:260,y:300},{x:370,y:250},{x:480,y:210},{x:600,y:190},{x:720,y:170}];
    let idx=0;

    const svg = svgEl("svg", { viewBox:"0 0 900 540", width:"100%", height:"100%", preserveAspectRatio:"xMidYMid slice" });
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:540, fill:"#f2f0e8" }));
    svg.appendChild(svgEl("path", { d:"M80 420 C 220 260, 380 240, 520 200 C 650 165, 740 150, 820 120", fill:"none", stroke:"#000030", "stroke-width":18, "stroke-linecap":"round" }));
    const dots = pts.map(p=>{ const c=svgEl("circle", {cx:p.x, cy:p.y, r:18, fill:"#fff", stroke:"#000030", "stroke-width":8}); svg.appendChild(c); return c; });
    api.arena.appendChild(svg);

    function toSvg(e){
      const r=api.arena.getBoundingClientRect();
      return { x:(e.clientX-r.left)/r.width*900, y:(e.clientY-r.top)/r.height*540 };
    }
    function hit(x,y){
      const t=pts[idx];
      const dx=x-t.x, dy=y-t.y;
      if(dx*dx+dy*dy<=40*40){
        dots[idx].setAttribute("fill","#e01020");
        idx++;
        api.vibrate(10);
        if(idx>=pts.length && !done){ done=true; api.ok("swipe"); }
      }
    }

    let active=false;
    api.arena.addEventListener("pointerdown",(e)=>{ if(done) return; active=true; idx=0; dots.forEach(d=>d.setAttribute("fill","#fff")); api.arena.setPointerCapture(e.pointerId); const p=toSvg(e); hit(p.x,p.y); });
    api.arena.addEventListener("pointermove",(e)=>{ if(!active||done) return; const p=toSvg(e); hit(p.x,p.y); });
    api.arena.addEventListener("pointerup",()=>{active=false;});
    api.arena.addEventListener("pointercancel",()=>{active=false;});
  }

  /* 18+ */
  function open18(){ $("#modal18").classList.add("show"); }
  function close18(){ $("#modal18").classList.remove("show"); }

  $("#m18-no").addEventListener("click", close18);
  $("#modal18").addEventListener("click", (e) => { if (e.target === $("#modal18")) close18(); });
  $("#m18-yes").addEventListener("click", () => {
    state.adult = true;
    save();
    $("#btn-18").classList.add("on");
    close18();
    renderHome();
  });
  $("#btn-18").addEventListener("click", () => {
    if (state.adult){
      state.adult = false;
      save();
      $("#btn-18").classList.remove("on");
      renderHome();
    } else {
      open18();
    }
  });

  /* Exit */
  $("#btn-exit").addEventListener("click", () => {
    stopTimers();
    state.mode = "home";
    renderHome();
  });

  /* Nav */
  $("#btn-home").addEventListener("click", renderHome);
  $("#btn-practice").addEventListener("click", renderPractice);
  $("#btn-run").addEventListener("click", startRun);

  load();
  if (state.adult) $("#btn-18").classList.add("on");
  renderHome();
})();
</script>
